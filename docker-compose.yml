services:
  postgres:
    image: postgres:16-alpine
    container_name: aem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aem
      POSTGRES_PASSWORD: aem_dev
      POSTGRES_DB: aem
    ports:
      - "5433:5432"
    volumes:
      - aem_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aem -d aem"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aem_pgdata:
